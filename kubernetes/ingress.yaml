apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: production-platform-ingress
  namespace: production-platform

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000