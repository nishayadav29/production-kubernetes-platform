services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "3002:3002"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3003:3003"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      - order-service

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: