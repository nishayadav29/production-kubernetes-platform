apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.orderService.replicaCount }}

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: {{ .Values.orderService.image }}
          imagePullPolicy: {{ .Values.orderService.imagePullPolicy }}

          ports:
            - containerPort: {{ .Values.orderService.servicePort }}