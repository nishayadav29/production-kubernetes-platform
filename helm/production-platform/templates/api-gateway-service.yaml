apiVersion: v1
kind: Service

metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: api-gateway

  ports:
    - protocol: TCP
      port: {{ .Values.apiGateway.servicePort }}
      targetPort: {{ .Values.apiGateway.servicePort }}

  type: {{ .Values.apiGateway.serviceType }}